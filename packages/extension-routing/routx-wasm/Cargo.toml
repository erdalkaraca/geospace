[package]
name = "routx-wasm"
version = "0.1.0"
edition = "2024"

[dependencies]
wasm-bindgen = "0.2"
routx = "1.0.3"
js-sys = "0.3"
log = "0.4"
env_logger = { version = "0.11", optional = true }

[features]
default = []
bin = ["env_logger"]

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "pbf-to-routx"
path = "src/main.rs"

